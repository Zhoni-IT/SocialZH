{% extends 'accounts/base.html' %}
{% block title %}Проверка пароля{% endblock %}

{% block content %}
<div class="feed-scroll" style="padding: 20px;">
    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2>Результат проверки</h2>
        {% if pwd %}
        <p>Ваш пароль: <code style="font-size: 1.4em; background: #f1f5f9; padding: 4px 8px; border-radius: 6px;">{{ pwd }}</code></p>
        <h3 style="color: {{ color }};">{{ res }}</h3>
        {% else %}
        <p>Введите пароль для проверки</p>
        {% endif %}

        <form method="post" style="margin-top: 20px;">
            {% csrf_token %}
            <input type="password" name="password" placeholder="Введите пароль..." class="input-field" required>
            <button type="submit" class="cta-form-btn" style="margin-top: 15px;">Проверить</button>
        </form>

        <a href="javascript:history.back()" style="display:block; margin-top:20px; color:#6366f1; text-decoration:none; font-weight:600;">← Назад</a>
    </div>
</div>
{% endblock %}
