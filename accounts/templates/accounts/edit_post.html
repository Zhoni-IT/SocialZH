{% extends 'accounts/base.html' %}
{% block title %}Редактировать пост{% endblock %}

{% block content %}
<div class="feed-scroll" style="padding:20px;">
    <h2>Редактирование поста</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="cta-form-btn">Сохранить</button>
    </form>
</div>
{% endblock %}
