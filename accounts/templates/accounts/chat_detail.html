{% extends 'accounts/base.html' %}

{% block title %}Чат{% endblock %}

{% block header %}
<header class="z-header" style="display: flex; justify-content: space-between; align-items: center;">
    <button class="back-btn" onclick="window.history.back()">←</button>
    <div style="flex: 1; text-align: center;">
        <h2 style="margin: 0; font-size: 16px; font-weight: 700;">@<span id="otherUsername"></span></h2>
    </div>
    <div style="width: 40px;"></div>
</header>
{% endblock %}

{% block content %}
<style>
    .feed-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 15px 20px 100px;
        display: flex;
        flex-direction: column;
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 15px;
    }

    .message {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .message.sent {
        justify-content: flex-end;
    }

    .message.received {
        justify-content: flex-start;
    }

    .message-bubble {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        word-wrap: break-word;
    }

    .message.sent .message-bubble {
        background: #6366f1;
        color: white;
        border-radius: 12px 12px 4px 12px;
    }

    .message.received .message-bubble {
        background: #e2e8f0;
        color: #1e293b;
        border-radius: 12px 12px 12px 4px;
    }

    .message-time {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 3px;
    }

    .send-form {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .send-form textarea {
        flex: 1;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        max-height: 100px;
    }

    .send-form button {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 12px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        transition: background 0.2s;
    }

    .send-form button:hover {
        background: #4f46e5;
    }

    .no-messages {
        text-align: center;
        color: #94a3b8;
        padding: 50px 20px;
    }
</style>

<div class="feed-scroll">
    <div class="messages-container" id="messagesContainer">
        <!-- Сообщения будут загружены здесь -->
    </div>

    <form class="send-form" id="sendForm" onsubmit="sendMessage(event)">
        {% csrf_token %}
        <textarea id="messageInput" placeholder="Ваше сообщение..." required></textarea>
        <button type="button" onclick="startVoiceRecognition()" title="Голосовой ввод">🎙</button>
        <button type="submit">📤</button>
    </form>
</div>

<script>
    const currentUserId = Number('{{ request.user.id }}') || null;
    const userId = '{{ other_user_id|escapejs }}';
    const isBot = userId === 'bot';
    
    // Загрузить сообщения при открытии чата
    loadMessages();
    
    // Загружать сообщения каждые 2 секунды, но не для бота
    if (!isBot) {
        setInterval(loadMessages, 2000);
    }

    function loadMessages() {
        fetch(`/messages/chat/${userId}/`, {
            method: 'GET',
            credentials: 'same-origin',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => { throw new Error(`Load messages failed: ${response.status} ${response.statusText} ${text}`); });
            }
            return response.json();
        })
        .then(data => {
            if (data.success) {
                document.getElementById('otherUsername').textContent = data.other_user.username;
                renderMessages(data.messages);
            } else {
                console.error('Load messages error:', data);
            }
        })
        .catch(error => console.error('Error loading messages:', error));
    }

    function addMessage(msg) {
        const container = document.getElementById('messagesContainer');
        const isOwn = msg.sender__id === currentUserId;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'sent' : 'received'}`;
        
        const date = new Date(msg.created_at);
        const time = date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
        
        messageDiv.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: ${isOwn ? 'flex-end' : 'flex-start'};">
                <div class="message-bubble">${escapeHtml(msg.content)}</div>
                <div class="message-time">${time}</div>
            </div>
        `;
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        
        if (messages.length === 0) {
            container.innerHTML = '<div class="no-messages"><p>Начните беседу...</p></div>';
            return;
        }

        container.innerHTML = '';
        messages.forEach(msg => {
            const isOwn = msg.sender__id === currentUserId;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'sent' : 'received'}`;
            
            const date = new Date(msg.created_at);
            const time = date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            
            messageDiv.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: ${isOwn ? 'flex-end' : 'flex-start'};">
                    <div class="message-bubble">${escapeHtml(msg.content)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(messageDiv);
        });

        // Прокрутить вниз
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage(event) {
        event.preventDefault();
        
        const content = document.getElementById('messageInput').value.trim();
        if (!content) return;

        const formData = new FormData();
        formData.append('content', content);

        fetch(`/messages/send/${userId}/`, {
            method: 'POST',
            credentials: 'same-origin',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('input[name="csrfmiddlewaretoken"]')?.value,
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => {
                    throw new Error(`Send message failed: ${response.status} ${response.statusText} ${text}`);
                });
            }
            return response.json();
        })
        .then(data => {
            if (data.success) {
                document.getElementById('messageInput').value = '';
                loadMessages();
                showToast('Сообщение отправлено');
            } else {
                showToast('Ошибка отправки: ' + (data.message || 'Неизвестная ошибка'));
            }
        })
        .catch(error => {
            console.error('Error sending message:', error);
            showToast('Ошибка сети: ' + (error.message || ''));
        });
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function startVoiceRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast('Голосовое распознавание не поддерживается в этом браузере.');
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const input = document.getElementById('messageInput');
            input.value = transcript;
            showToast('Распознано: ' + transcript);
        };

        recognition.onerror = (event) => {
            showToast('Ошибка распознавания: ' + event.error);
        };

        recognition.start();
    }

    function showToast(message) {
        const toast = document.getElementById('global-toast');
        if (toast) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 1800);
        }
    }
</script>
{% endblock %}
