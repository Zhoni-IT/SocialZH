{% extends 'accounts/base.html' %}

{% block title %}Уведомления{% endblock %}

{% block header %}
<header class="z-header" style="display: flex; justify-content: space-between; align-items: center;">
    <button class="back-btn" onclick="window.history.back()">←</button>
    <h2 style="margin: 0; font-size: 18px; font-weight: 700;">Уведомления</h2>
    <div style="width: 40px;"></div>
</header>
{% endblock %}

{% block content %}
<style>
.notification-list {
    margin: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.notification-item {
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    background: #fff;
    padding: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,.03);
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.notification-item.unread {
    border-color: #6366f1;
    background: #eef2ff;
}
.notification-item .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #64748b;
}
.notification-item .title {
    font-weight: 700;
    font-size: 14px;
    color: #1e293b;
}
.notification-item .content {
    font-size: 13px;
    color: #334155;
    white-space: pre-line;
}
.notification-controls {
    margin-top: 8px;
    display: flex;
    gap: 6px;
}
.notification-controls button {
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    color: #1e293b;
    border-radius: 8px;
    padding: 4px 9px;
    font-size: 12px;
    cursor: pointer;
}
.notification-controls button:hover {
    background: #e2e8f0;
}
</style>

<div class="notification-list" id="notificationList">
    <div style="text-align: center; padding: 20px; color: #64748b; font-size: 14px;">Загрузка уведомлений...</div>
</div>

<script>
function loadNotifications() {
    fetch('/notifications/', {
        method: 'GET',
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            renderNotifications(data.notifications);
            updateUnreadBadge(data.unread_count);
        } else {
            document.getElementById('notificationList').innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b; font-size: 14px;">Ошибка загрузки уведомлений</div>';
        }
    })
    .catch(error => {
        console.error('Error loading notifications:', error);
        document.getElementById('notificationList').innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b; font-size: 14px;">Ошибка загрузки уведомлений</div>';
    });
}

function renderNotifications(notifications) {
    const container = document.getElementById('notificationList');
    
    if (notifications.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b; font-size: 14px;">Нет уведомлений</div>';
        return;
    }
    
    container.innerHTML = '';
    
    notifications.forEach(notif => {
        const item = document.createElement('div');
        item.className = `notification-item ${notif.is_read ? '' : 'unread'}`;
        item.id = `notif-${notif.id}`;
        
        const date = new Date(notif.created_at);
        const formattedDate = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
        
        item.innerHTML = `
            <div class="meta">
                <span>${notif.type}</span>
                <span>${formattedDate}</span>
            </div>
            <div class="title">${notif.title}</div>
            <div class="content">${notif.content}</div>
            <div class="notification-controls">
                <button onclick="markNotificationRead(${notif.id})">${notif.is_read ? 'Обновить' : 'Отметить прочитанным'}</button>
                ${notif.type_key === 'message' && notif.sender_id ? `<button onclick="openChatFromNotification(${notif.sender_id})">Открыть чат</button>` : ''}
            </div>
        `;
        
        container.appendChild(item);
    });
}

function updateUnreadBadge(count) {
    // Update any notification badges if they exist
    const badges = document.querySelectorAll('.notification-badge');
    badges.forEach(badge => {
        if (count > 0) {
            badge.textContent = count;
            badge.style.display = 'inline';
        } else {
            badge.style.display = 'none';
        }
    });
}

function markNotificationRead(notifId) {
    fetch(`/notifications/${notifId}/read/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCSRFToken(),
            'Accept': 'application/json'
        }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const item = document.getElementById('notif-' + notifId);
            if (item) {
                item.classList.remove('unread');
            }
            loadNotifications(); // Reload to update unread count
            notify('Уведомление отмечено как прочитанное');
        }
    });
}

function openChatFromNotification(userId) {
    window.location.href = `/messages/chat/${userId}/`;
}

// Load notifications when page loads
document.addEventListener('DOMContentLoaded', loadNotifications);
</script>
{% endblock %}
