{% extends 'accounts/base.html' %}
{% block title %}Генератор паролей{% endblock %}

{% block extra_css %}
<style>
    .gen-card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }
    .password-display {
        background: #f1f5f9;
        border: 2px dashed #6366f1;
        padding: 15px;
        border-radius: 12px;
        font-family: 'Courier New', monospace;
        font-size: 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 20px 0;
        color: #1e293b;
    }
    .setting-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 14px;
        color: #475569;
    }
    .checkbox-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
    }
</style>
{% endblock %}

{% block content %}
<div class="feed-scroll" style="padding: 20px;">
    <div class="gen-card">
        <h2 style="margin-top:0;">Настройки</h2>
        <form method="post">
            {% csrf_token %}
            <div class="setting-item">
                <label>Длина: </label>
                <input type="number" name="length" value="{{ length|default:12 }}" min="4" max="32" class="input-field" style="width: 70px; margin:0;">
            </div>
            
            <div class="checkbox-group">
                <label class="setting-item"><input type="checkbox" name="use_nums" {% if use_nums %}checked{% endif %}> Цифры</label>
                <label class="setting-item"><input type="checkbox" name="use_spec" {% if use_spec %}checked{% endif %}> Символы</label>
                <label class="setting-item"><input type="checkbox" name="use_upper" {% if use_upper %}checked{% endif %}> Заглавные</label>
            </div>
            
            <button type="submit" class="cta-form-btn" style="background: #6366f1; margin-top:15px;">🔄 Обновить пароль</button>
        </form>
    </div>

    {% if password %}
    <div class="gen-card" style="border-top: 4px solid #10b981;">
        <h3 style="margin:0; color:#64748b; font-size:14px; text-transform: uppercase;">Ваш новый пароль</h3>
        <div class="password-display">
            <span id="pText">{{ password }}</span>
            <button onclick="copyP()" id="cBtn" style="background:#6366f1; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px;">Копия</button>
        </div>
        
        <a href="{% url 'register' %}" class="cta-form-btn" style="background:#10b981; display:block; text-align:center; text-decoration:none;">✅ Готово, к регистрации</a>
    </div>
    {% endif %}
</div>

<script>
function copyP() {
    const text = document.getElementById('pText').innerText;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('cBtn');
        btn.innerText = '✅ Копировано';
        btn.style.background = '#10b981';
        setTimeout(() => {
            btn.innerText = 'Копия';
            btn.style.background = '#6366f1';
        }, 2000);
    });
}
</script>
{% endblock %}
